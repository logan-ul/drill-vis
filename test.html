<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="hijohn()">HI JOHN</button>
    <button onclick="noJohn()">not john</button>
    <button onclick="isJohn()">check</button>
</body>
<script>
    let john = "john"
    let johnStatus = 0
    function hijohn(){
        while (isJohn()){
            console.log("Hi john")
            console.log(john)
        }
        console.log("No john :(")
    }

    function isJohn(){
        if(johnStatus == 0){
            console.log("john")
            return true
        }else{
            console.log("not john")
            return false
        }
    }
    function noJohn(){
        johnStatus++
        console.log(johnStatus)
    }
</script>
</html>
