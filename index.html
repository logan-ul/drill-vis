<body>
    <div id="buttons">
        <button onclick="columnRight()">Column Right</button>
        <button onclick="constantForwardMarch()">Forward March</button>
        <button onclick="flightHalt()">Flight Halt</button>
        <button onclick="constantHalfStep()">Half Step March</button>
        <button onclick="toTheRearMarch()">To The Rear March</button>
        <button onclick="aboutFaceAll()">About Face</button>
        <button onclick="rightFace()">Right Face</button>
        <button onclick="leftFace()">Left Face</button>
        <button onclick="rightFlank()">Right Flank</button>
        <button onclick="leftFlank()">Left Flank</button>

        <button onclick="closeMarch()">Close March</button>
        <button onclick="extendMarch()">Extend March</button>

    <canvas id="drillCanvas" width="1500" height="1700"></canvas>
</body>
<script>
    const formation = [
      { x: 3, y: 15, dir: "N" },
      { x: 5, y: 15, dir: "N" },
      { x: 7, y: 15, dir: "N" },
      { x: 3, y: 13, dir: "N" },
      { x: 5, y: 13, dir: "N" },
      { x: 7, y: 13, dir: "N" },
      { x: 3, y: 11, dir: "N" },
      { x: 5, y: 11, dir: "N" },
      { x: 7, y: 11, dir: "N" },
      { x: 1, y: 13, dir: "N" }
    ];
    const canvas = document.getElementById("drillCanvas");
    const ctx = canvas.getContext("2d");
    let p = 10
    let checkMove = 1 //sets whether or not the dots are moving

    function flightHalt(){
        // stops movement
        if(checkMove < 1){
            checkMove++
        }else if(checkMove > 1){
            checkMove--
        }
    }

    async function constantForwardMarch(){
        // moves without stopping
        if(checkMove > 1){
            checkMove--
            checkMove--
        }else if(checkMove > 0){
            checkMove--
        }else if(checkMove == 0){
            return
        }
        while(checkMove == 0){
            forwardMarchAll()
            await sleep(500)
        }
    }
    async function constantHalfStep(){
        // moves in half step without stopping
        if(checkMove < 1){
            checkMove++
            checkMove++
        }else if(checkMove < 2){
            checkMove++
        }else if(checkMove == 2){
            return
        }
        while(checkMove == 2){
            forwardHalfStepAll()
            await sleep(500)
        }
    }

    function drawFormation() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      formation.forEach(cadet => {
        ctx.beginPath();
        ctx.arc(cadet.x * 40, cadet.y * 40, 10, 0, Math.PI * 2);
        ctx.fill();
      });
    }
    drawFormation()
    function forwardMarch(dir, cadet) {
        if (dir =="N"){
              cadet.y -= 1; // move up
        }else if(dir =="E"){
              cadet.x += 1; // move up
        }else if(dir =="S"){
              cadet.y += 1; // move up
        }else if(dir =="W"){
              cadet.x -= 1; // move up
        }else if(dir =="NE"){
              cadet.x += 1; // move up
              cadet.y -= 1;
        }else if(dir =="NW"){
              cadet.x -= 1; // move up
              cadet.y -= 1;
        }else if(dir =="SE"){
              cadet.x += 1; // move up
              cadet.y += 1;
        }else if(dir =="SW"){
              cadet.x -= 1; // move up
              cadet.y += 1;
        }
        drawFormation()
    }

    function forwardMarchAll(){
        forwardMarch(formation[8].dir, formation[8])
        forwardMarch(formation[7].dir, formation[7])
        forwardMarch(formation[6].dir, formation[6])
        forwardMarch(formation[5].dir, formation[5])
        forwardMarch(formation[4].dir, formation[4])
        forwardMarch(formation[3].dir, formation[3])
        forwardMarch(formation[2].dir, formation[2])
        forwardMarch(formation[1].dir, formation[1])
        forwardMarch(formation[0].dir, formation[0])
        forwardMarch(formation[9].dir, formation[9])
    }
    function forwardHalfStepAll(){
        forwardHalfStep(formation[8].dir, formation[8])
        forwardHalfStep(formation[7].dir, formation[7])
        forwardHalfStep(formation[6].dir, formation[6])
        forwardHalfStep(formation[5].dir, formation[5])
        forwardHalfStep(formation[4].dir, formation[4])
        forwardHalfStep(formation[3].dir, formation[3])
        forwardHalfStep(formation[2].dir, formation[2])
        forwardHalfStep(formation[1].dir, formation[1])
        forwardHalfStep(formation[0].dir, formation[0])
        forwardHalfStep(formation[9].dir, formation[9])
    }

    function forwardHalfStep(dir, cadet, mult = 1) {
        if (dir =="N"){
              cadet.y -= 0.5*mult; // move up
        }else if(dir =="E"){
              cadet.x += 0.5*mult; // move up
        }else if(dir =="S"){
              cadet.y += 0.5*mult; // move up
        }else if(dir =="W"){
              cadet.x -= 0.5*mult; // move up
        }else if(dir =="NE"){
              cadet.x += 0.5*mult; // move up
              cadet.y -= 0.5*mult;
        }else if(dir =="NW"){
              cadet.x -= 0.5*mult; // move up
              cadet.y -= 0.5*mult;
        }else if(dir =="SE"){
              cadet.x += 0.5*mult; // move up
              cadet.y += 0.5*mult;
        }else if(dir =="SW"){
              cadet.x -= 0.5*mult; // move up
              cadet.y += 0.5*mult;
        }
        drawFormation()
    }

    function turnHalfRight(cadet){
        if (cadet.dir == "N"){
            cadet.dir = "NE"
        }else if (cadet.dir == "E"){
            cadet.dir = "SE"
        }else if (cadet.dir == "S"){
            cadet.dir = "SW"
        }else if (cadet.dir == "W"){
            cadet.dir = "NW"
        }else if (cadet.dir == "NE"){
            cadet.dir = "E"
        }else if (cadet.dir == "NW"){
            cadet.dir = "N"
        }else if (cadet.dir == "SE"){
            cadet.dir = "S"
        }else if (cadet.dir == "SW"){
            cadet.dir = "W"
        }else {
            console.log("You're an idiot. turnHalfRight only takes one argument")
        }
    }
    function turnRight(cadet){
        turnHalfRight(cadet)
        turnHalfRight(cadet)
    }
    function turnLeft(cadet){
        turnRight(cadet)
        turnRight(cadet)
        turnRight(cadet)
    }
    function aboutFace(cadet){
        turnRight(cadet)
        turnRight(cadet)
    }
    const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

    function aboutFaceAll(){
        aboutFace(formation[0])
        aboutFace(formation[1])
        aboutFace(formation[2])
        aboutFace(formation[3])
        aboutFace(formation[4])
        aboutFace(formation[5])
        aboutFace(formation[6])
        aboutFace(formation[7])
        aboutFace(formation[8])
        aboutFace(formation[9])
    }
    async function toTheRearMarch(){
        if(checkMove < 1){
            checkMove++
        }else if(checkMove > 1){
            checkMove--
        }
        // await sleep(500)
        forwardMarchAll()
        await sleep(500)
        aboutFaceAll()
        await sleep(500)
        forwardMarchAll()
        await sleep(500)
        constantForwardMarch()
    }
    function rightFace(){
        turnRight(formation[0])
        turnRight(formation[1])
        turnRight(formation[2])
        turnRight(formation[3])
        turnRight(formation[4])
        turnRight(formation[5])
        turnRight(formation[6])
        turnRight(formation[7])
        turnRight(formation[8])
        turnRight(formation[9])
    }
    function leftFace(){
        turnLeft(formation[0])
        turnLeft(formation[1])
        turnLeft(formation[2])
        turnLeft(formation[3])
        turnLeft(formation[4])
        turnLeft(formation[5])
        turnLeft(formation[6])
        turnLeft(formation[7])
        turnLeft(formation[8])
        turnLeft(formation[9])
    }
    async function rightFlank(){
        if(checkMove < 1){
            checkMove++
        }else if(checkMove > 1){
            return
        }else{
            forwardMarchAll()
        }
        rightFace()
        await sleep(500)
        constantForwardMarch()
    }
    async function leftFlank(){
        if(checkMove < 1){
            checkMove++
        }else if(checkMove > 1){
            return
        }else{
            forwardMarchAll()
        }
        leftFace()
        await sleep(500)
        constantForwardMarch()
    }
    async function reportIn(){
        forwardMarch(formation[9].dir, formation[9])
        await sleep(500)
        forwardMarch(formation[9].dir, formation[9])
        await sleep(500)
        forwardMarch(formation[9].dir, formation[9])
        await sleep(500)
        forwardMarch(formation[9].dir, formation[9])
        await sleep(500)
        aboutFace(formation[9])
    }
    async function rightStep(cadet){
        if (cadet.dir =="N"){
              cadet.x += 0.5; // move up
        }else if(cadet.dir =="E"){
              cadet.y += 0.5; // move up
        }else if(cadet.dir =="S"){
              cadet.x -= 0.5; // move up
        }else if(cadet.dir =="W"){
              cadet.y -= 0.5; // move up
        }
        drawFormation()
    }

    async function leftStep(cadet){
        if (cadet.dir =="N"){
              cadet.x -= 0.5; // move up
        }else if(cadet.dir =="E"){
              cadet.y -= 0.5; // move up
        }else if(cadet.dir =="S"){
              cadet.x += 0.5; // move up
        }else if(cadet.dir =="W"){
              cadet.y += 0.5; // move up
        }
        drawFormation()
    }

    async function closeMarch(){
        if(checkMove == 1){
            let formationByElements = findElements()
            formationByElements[1].forEach(cadetTemp => {
                rightStep(cadetTemp)
            })
            formationByElements[2].forEach(cadetTemp => {
                rightStep(cadetTemp)
            })
            await sleep(500)
            formationByElements[1].forEach(cadetTemp => {
                rightStep(cadetTemp)
            })
            formationByElements[2].forEach(cadetTemp => {
                rightStep(cadetTemp)
            })
            await sleep(500)
            formationByElements[2].forEach(cadetTemp => {
                rightStep(cadetTemp)
            })
            await sleep(500)
            formationByElements[2].forEach(cadetTemp => {
                rightStep(cadetTemp)
            })
        }
    }
    async function extendMarch(){
        if(checkMove == 1){
            let formationByElements = findElements()
            formationByElements[1].forEach(cadetTemp => {
                leftStep(cadetTemp)
            })
            formationByElements[2].forEach(cadetTemp => {
                leftStep(cadetTemp)
            })
            await sleep(500)
            formationByElements[1].forEach(cadetTemp => {
                leftStep(cadetTemp)
            })
            formationByElements[2].forEach(cadetTemp => {
                leftStep(cadetTemp)
            })
            await sleep(500)
            formationByElements[2].forEach(cadetTemp => {
                leftStep(cadetTemp)
            })
            await sleep(500)
            formationByElements[2].forEach(cadetTemp => {
                leftStep(cadetTemp)
            })
        }
    }


    function findElements(){
        /*
        Check direction of flight
        set each element into a list that will be iterated later
            - if statements for each direction
        return elements
        */
       let direct = formation[8].dir
       let element1 = []
       let element2 = []
       let element3 = []

       if(direct == "N"){
        element1 = [formation[8], formation[5], formation[2]]
        element2 = [formation[7], formation[4], formation[1]]
        element3 = [formation[6], formation[3], formation[0]]
        return [element1, element2, element3]
       }else if(direct == "E"){
        element1 = [formation[2], formation[1], formation[0]]
        element2 = [formation[5], formation[4], formation[3]]
        element3 = [formation[8], formation[7], formation[6]]
        return [element1, element2, element3]
       }else if(direct == "S"){
        element1 = [formation[0], formation[3], formation[6]]
        element2 = [formation[1], formation[4], formation[7]]
        element3 = [formation[2], formation[5], formation[8]]
        return [element1, element2, element3]
       }else if(direct == "W"){
        element1 = [formation[6], formation[7], formation[8]]
        element2 = [formation[3], formation[4], formation[5]]
        element3 = [formation[0], formation[1], formation[2]]
        return [element1, element2, element3]
       }else{
        console.log("I'm not doing diagonals")
       }
    }

    function findRows(){
        /*
        check direction og the flight
        set each row into a list
            - if statements
        */
        let direct = formation[8].dir
        let row1 = []
        let row2 = []
        let row3 = []

        if(direct == "N"){
         row1 = [formation[6], formation[7], formation[8]]
         row2 = [formation[3], formation[4], formation[5]]
         row3 = [formation[0], formation[1], formation[2]]
         return row1, row2, row3
        }else if(direct == "E"){
         row1 = [formation[8], formation[5], formation[2]]
         row2 = [formation[7], formation[4], formation[1]]
         row3 = [formation[6], formation[3], formation[0]]
         return row1, row2, row3
        }else if(direct == "S"){
         row1 = [formation[0], formation[1], formation[2]]
         row2 = [formation[3], formation[4], formation[5]]
         row3 = [formation[6], formation[7], formation[8]]
         return row1, row2, row3
        }else if(direct == "W"){
         row1 = [formation[0], formation[3], formation[6]]
         row2 = [formation[1], formation[4], formation[7]]
         row3 = [formation[2], formation[5], formation[8]]
         return row1, row2, row3
        }else{
         console.log("I'm not doing diagonals")
        }
    }
