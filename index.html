<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="buttons">
        <button onclick="columnRight()">Column Right</button>
        <button onclick="constantForwardMarch()">Forward March</button>
        <button onclick="flightHalt()">Flight Halt</button>
        <button onclick="constantHalfStep()">Half Step March</button>
        <button onclick="toTheRearMarch()">To The Rear March</button>
        <button onclick="aboutFaceAll()">About Face</button>
        <button onclick="rightFace()">Right Face</button>
        <button onclick="leftFace()">Left Face</button>
        <button onclick="rightFlank()">Right Flank</button>
        <button onclick="leftFlank()">Left Flank</button>
        <button onclick="reportIn()">Report In</button>
        <button onclick="closeMarch()">Close March</button>
        <button onclick="extendMarch()">Extend March</button>
        <button onclick="openRanksMarch()">Open Ranks March</button>
        <button onclick="closeRanksMarch()">Close Ranks March</button>
        <button onclick="leftStepMarch()">Left Step March</button>
    </div>
    <canvas id="drillCanvas" width="1500" height="1700"></canvas>
</body>
<script>
    const formation = [
      { x: 33, y: 35, dir: "N" },
      { x: 35, y: 35, dir: "N" },
      { x: 37, y: 35, dir: "N" },
      { x: 33, y: 33, dir: "N" },
      { x: 35, y: 33, dir: "N" },
      { x: 37, y: 33, dir: "N" },
      { x: 33, y: 31, dir: "N" },
      { x: 35, y: 31, dir: "N" },
      { x: 37, y: 31, dir: "N" },
      { x: 31, y: 33, dir: "N" }
    ];
    const canvas = document.getElementById("drillCanvas");
    const ctx = canvas.getContext("2d");
    let p = 10
    let checkMove = 1 //sets whether or not the dots are moving
    const dirToAngle = {
          N: 90,
          NE: 45,
          E: 0,
          SE: 315,
          S: 270,
          SW: 225,
          W: 180,
          NW: 135
        };
    
    function centerLine(){
        ctx.beginPath();
        ctx.moveTo(0,canvas.height / 2);
        ctx.lineTo(canvas.width, canvas.height / 2);
        ctx.stroke();
    }
    centerLine()

    function flightHalt(){
        // stops movement
        if(checkMove < 1){
            checkMove++
        }else if(checkMove > 1){
            checkMove--
        }
    }

    async function constantForwardMarch(){
        // moves without stopping
        if(checkMove > 1){
            checkMove--
            checkMove--
        }else if(checkMove > 0){
            checkMove--
        }else if(checkMove == 0){
            return
        }
        while(checkMove == 0){
            forwardMarchAll()
            await sleep(500)
        }
    }
    async function constantHalfStep(){
        // moves in half step without stopping
        if(checkMove < 1){
            checkMove++
            checkMove++
        }else if(checkMove < 2){
            checkMove++
        }else if(checkMove == 2){
            return
        }
        while(checkMove == 2){
            forwardHalfStepAll()
            await sleep(500)
        }
    }
    async function constantHalfStepSpecific(cadet){
        // moves one cadet in half step without stopping
        if(checkMove < 1){
            checkMove++
            checkMove++
        }else if(checkMove < 2){
            checkMove++
        }else if(checkMove == 2){
            return
        }
        while(checkMove == 2){
            forwardHalfStep(cadet)
            await sleep(500)
        }
    }

    function drawFormation() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      centerLine()

      formation.forEach(cadet => {
        ctx.beginPath();
        ctx.arc(cadet.x * 40, cadet.y * 40, 10, 0, Math.PI * 2);
        ctx.fill();
      });
    }
    drawFormation()
    function forwardMarch(cadet) {
        const diag = 1 / Math.sqrt(2);
        if (cadet.dir =="N"){
              cadet.y -= 1; // move up
        }else if(cadet.dir =="E"){
              cadet.x += 1; // move up
        }else if(cadet.dir =="S"){
              cadet.y += 1; // move up
        }else if(cadet.dir =="W"){
              cadet.x -= 1; // move up
        }else if(cadet.dir =="NE"){
              cadet.x += diag; // move up
              cadet.y -= diag;
        }else if(cadet.dir =="NW"){
              cadet.x -= diag; // move up
              cadet.y -= diag;
        }else if(cadet.dir =="SE"){
              cadet.x += diag; // move up
              cadet.y += diag;
        }else if(cadet.dir =="SW"){
              cadet.x -= diag; // move up
              cadet.y += diag;
        }
        drawFormation()
    }

    function forwardMarchAll(){
        forwardMarch(formation[8])
        forwardMarch(formation[7])
        forwardMarch(formation[6])
        forwardMarch(formation[5])
        forwardMarch(formation[4])
        forwardMarch(formation[3])
        forwardMarch(formation[2])
        forwardMarch(formation[1])
        forwardMarch(formation[0])
        forwardMarch(formation[9])
    }
    function forwardHalfStepAll(){
        forwardHalfStep(formation[8])
        forwardHalfStep(formation[7])
        forwardHalfStep(formation[6])
        forwardHalfStep(formation[5])
        forwardHalfStep(formation[4])
        forwardHalfStep(formation[3])
        forwardHalfStep(formation[2])
        forwardHalfStep(formation[1])
        forwardHalfStep(formation[0])
        forwardHalfStep(formation[9])
    }

    function forwardHalfStep(cadet, mult = 1) {
        const diag = 0.5 / Math.sqrt(2);
        if (cadet.dir =="N"){
              cadet.y -= 0.5*mult; // move up
        }else if(cadet.dir =="E"){
              cadet.x += 0.5*mult; // move up
        }else if(cadet.dir =="S"){
              cadet.y += 0.5*mult; // move up
        }else if(cadet.dir =="W"){
              cadet.x -= 0.5*mult; // move up
        }else if(cadet.dir =="NE"){
              cadet.x += diag*mult; // move up
              cadet.y -= diag*mult;
        }else if(cadet.dir =="NW"){
              cadet.x -= diag*mult; // move up
              cadet.y -= diag*mult;
        }else if(cadet.dir =="SE"){
              cadet.x += diag*mult; // move up
              cadet.y += diag*mult;
        }else if(cadet.dir =="SW"){
              cadet.x -= diag*mult; // move up
              cadet.y += diag*mult;
        }
        drawFormation()
    }

    function turnHalfRight(cadet){
        if (cadet.dir == "N"){
            cadet.dir = "NE"
        }else if (cadet.dir == "E"){
            cadet.dir = "SE"
        }else if (cadet.dir == "S"){
            cadet.dir = "SW"
        }else if (cadet.dir == "W"){
            cadet.dir = "NW"
        }else if (cadet.dir == "NE"){
            cadet.dir = "E"
        }else if (cadet.dir == "NW"){
            cadet.dir = "N"
        }else if (cadet.dir == "SE"){
            cadet.dir = "S"
        }else if (cadet.dir == "SW"){
            cadet.dir = "W"
        }else {
            console.log("You're an idiot. turnHalfRight only takes one argument")
        }
    }
    function turnRight(cadet){
        turnHalfRight(cadet)
        turnHalfRight(cadet)
    }
    function turnLeft(cadet){
        turnRight(cadet)
        turnRight(cadet)
        turnRight(cadet)
    }
    function aboutFace(cadet){
        turnRight(cadet)
        turnRight(cadet)
    }
    const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

    async function columnRight(){
        if(checkMove < 1){
            checkMove++
        }else if(checkMove > 1){
            checkMove--
        }
    }
    function aboutFaceAll(){
        if(checkMove == 1){
            aboutFace(formation[0])
            aboutFace(formation[1])
            aboutFace(formation[2])
            aboutFace(formation[3])
            aboutFace(formation[4])
            aboutFace(formation[5])
            aboutFace(formation[6])
            aboutFace(formation[7])
            aboutFace(formation[8])
            aboutFace(formation[9])
        }
    }
    async function toTheRearMarch(){
        if(checkMove < 1){
            checkMove++
        }else if(checkMove > 1){
            checkMove--
        }
        // await sleep(500)
        forwardMarchAll()
        await sleep(500)
        aboutFaceAll()
        await sleep(500)
        forwardMarchAll()
        await sleep(500)
        constantForwardMarch()
    }
    function rightFace(){
        if(checkMove == 1){
            turnRight(formation[0])
            turnRight(formation[1])
            turnRight(formation[2])
            turnRight(formation[3])
            turnRight(formation[4])
            turnRight(formation[5])
            turnRight(formation[6])
            turnRight(formation[7])
            turnRight(formation[8])
            turnRight(formation[9])
        }
    }
    function leftFace(){
        if(checkMove == 1){
            turnLeft(formation[0])
            turnLeft(formation[1])
            turnLeft(formation[2])
            turnLeft(formation[3])
            turnLeft(formation[4])
            turnLeft(formation[5])
            turnLeft(formation[6])
            turnLeft(formation[7])
            turnLeft(formation[8])
            turnLeft(formation[9])
        }
    }
    async function rightFlank(){
        if(checkMove < 1){
            checkMove++
        }else if(checkMove > 1){
            return
        }else{
            forwardMarchAll()
        }
        rightFace()
        await sleep(500)
        constantForwardMarch()
    }
    async function leftFlank(){
        if(checkMove < 1){
            checkMove++
        }else if(checkMove > 1){
            return
        }else{
            forwardMarchAll()
        }
        leftFace()
        await sleep(500)
        constantForwardMarch()
    }
    async function reportIn(){
        forwardMarch(formation[9])
        await sleep(500)
        forwardMarch(formation[9])
        await sleep(500)
        aboutFace(formation[9])
    }
    async function rightStep(cadet){
        if (cadet.dir =="N"){
              cadet.x += 0.5; // move up
        }else if(cadet.dir =="E"){
              cadet.y += 0.5; // move up
        }else if(cadet.dir =="S"){
              cadet.x -= 0.5; // move up
        }else if(cadet.dir =="W"){
              cadet.y -= 0.5; // move up
        }
        drawFormation()
    }

    async function leftStep(cadet){
        if (cadet.dir =="N"){
              cadet.x -= 0.5; // move up
        }else if(cadet.dir =="E"){
              cadet.y -= 0.5; // move up
        }else if(cadet.dir =="S"){
              cadet.x += 0.5; // move up
        }else if(cadet.dir =="W"){
              cadet.y += 0.5; // move up
        }
        drawFormation()
    }

    function findElements() {
        const angleDeg = dirToAngle[formation[0].dir]; // use formation direction
        const angleRad = angleDeg * Math.PI / 180;
        
        // Forward vector
        const forward = {
            x: Math.cos(angleRad),
            y: -Math.sin(angleRad)
        };
    
        // Right vector (perpendicular)
        const right = {
            x: Math.cos(angleRad - Math.PI / 2),
            y: -Math.sin(angleRad - Math.PI / 2)
        };
    
        // Use squad leader (index 0 or 9 depending on your setup)
        const origin = formation[4]; // center-ish (more stable than edge)
    
        // Convert everyone into formation-relative coordinates
        const elementsMap = {};
    
        formation.forEach(cadet => {
            const dx = cadet.x - origin.x;
            const dy = cadet.y - origin.y;
        
            const rightDist = dx * right.x + dy * right.y;
            const forwardDist = dx * forward.x + dy * forward.y;
        
            // Group by column (element)
            const spacing = 1; // tweak this if grouping is off
            const key = Math.round(rightDist / spacing);
        
            if (!elementsMap[key]) elementsMap[key] = [];
        
            elementsMap[key].push({
                cadet,
                forwardDist
            });
        });
    
        // Convert to sorted array of elements
        const elements = Object.keys(elementsMap)
            .sort((a, b) => a - b)
            .map(key => {
                return elementsMap[key]
                    .sort((a, b) => b.forwardDist - a.forwardDist)
                    .map(obj => obj.cadet);
            });
        console.log(angleDeg)
        return elements;
}

    async function closeMarch(){
        console.log(findElements())
        let exception = 0
        if(checkMove == 1){
            let formationByElements = findElements()
            formationByElements[1 + exception].forEach(cadetTemp => {
                rightStep(cadetTemp)
            })
            formationByElements[0 + exception].forEach(cadetTemp => {
                rightStep(cadetTemp)
            })
            await sleep(500)
            formationByElements[1 + exception].forEach(cadetTemp => {
                rightStep(cadetTemp)
            })
            formationByElements[0 + exception].forEach(cadetTemp => {
                rightStep(cadetTemp)
            })
            await sleep(500)
            formationByElements[0 + exception].forEach(cadetTemp => {
                rightStep(cadetTemp)
            })
            await sleep(500)
            formationByElements[0 + exception].forEach(cadetTemp => {
                rightStep(cadetTemp)
            })
        }else if(checkMove == 0){
            let formationByElements = findElements()
            formationByElements[0].forEach(cadetTemp => constantHalfStepSpecific(cadetTemp))
            formationByElements[1].forEach(cadetTemp => {
                
            })
        }
    }
    async function extendMarch(){
        console.log(findElements())
        if(checkMove == 1){
            let formationByElements = findElements()
            formationByElements[1].forEach(cadetTemp => {
                leftStep(cadetTemp)
            })
            formationByElements[0].forEach(cadetTemp => {
                leftStep(cadetTemp)
            })
            await sleep(500)
            formationByElements[1].forEach(cadetTemp => {
                leftStep(cadetTemp)
            })
            formationByElements[0].forEach(cadetTemp => {
                leftStep(cadetTemp)
            })
            await sleep(500)
            formationByElements[0].forEach(cadetTemp => {
                leftStep(cadetTemp)
            })
            await sleep(500)
            formationByElements[0].forEach(cadetTemp => {
                leftStep(cadetTemp)
            })
        }else if(checkMove == 0){
            let formationByElements = findElements()
        }
    }


    function findRows(){
        /*
        check direction og the flight
        set each row into a list
            - if statements
        */
        let direct = formation[8].dir
        let row1 = []
        let row2 = []
        let row3 = []

        if(direct == "N"){
         row1 = [formation[6], formation[7], formation[8]]
         row2 = [formation[3], formation[4], formation[5]]
         row3 = [formation[0], formation[1], formation[2]]
         return [row1, row2, row3]
        }else if(direct == "E"){
         row1 = [formation[8], formation[5], formation[2]]
         row2 = [formation[7], formation[4], formation[1]]
         row3 = [formation[6], formation[3], formation[0]]
         return [row1, row2, row3]
        }else if(direct == "S"){
         row1 = [formation[0], formation[1], formation[2]]
         row2 = [formation[3], formation[4], formation[5]]
         row3 = [formation[6], formation[7], formation[8]]
         return [row1, row2, row3]
        }else if(direct == "W"){
         row1 = [formation[0], formation[3], formation[6]]
         row2 = [formation[1], formation[4], formation[7]]
         row3 = [formation[2], formation[5], formation[8]]
         return [row1, row2, row3]
        }else{
         console.log("I'm not doing diagonals")
        }
    }

    async function openRanksMarch(){
        if(checkMove == 1 && ((Math.abs(formation[9].x - formation[3].x) || Math.abs(formation[9].y - formation[3].y)) > 2)){
            let formationByRows = findRows()
            formationByRows[0].forEach(cad => forwardMarch(cad.dir, cad))
            formationByRows[1].forEach(cad => forwardMarch(cad.dir, cad))
            await sleep(500)
            formationByRows[0].forEach(cad => forwardMarch(cad.dir, cad))
        }
    }
    async function closeRanksMarch(){
        if(checkMove == 1 && (((Math.abs(formation[3].x - formation[5].x) || Math.abs(formation[3].y - formation[5].y)) || (Math.abs(formation[7].x - formation[1].x) || Math.abs(formation[7].y - formation[5].y))) > 4)){
            let formationByRows = findRows()
            formationByRows[2].forEach(cad => forwardMarch(cad.dir, cad))
            formationByRows[1].forEach(cad => forwardMarch(cad.dir, cad))
            await sleep(500)
            formationByRows[2].forEach(cad => forwardMarch(cad.dir, cad))
        }
    }

    async function leftStepMarch(){
        if(checkMove == 1){
            checkMove--
            while(checkMove == 0){
                leftStep(formation[0])
                leftStep(formation[1])
                leftStep(formation[2])
                leftStep(formation[3])
                leftStep(formation[4])
                leftStep(formation[5])
                leftStep(formation[6])
                leftStep(formation[7])
                leftStep(formation[8])
                leftStep(formation[9])
                await sleep(500)
            }
        }
    }

</script>
