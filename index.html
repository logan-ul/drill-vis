    <canvas id="drillCanvas" width="1500" height="700"></canvas>

<script>
    const formation = [
      { x: 3, y: 15, dir: "N" },
      { x: 5, y: 15, dir: "N" },
      { x: 7, y: 15, dir: "N" },
      { x: 3, y: 13, dir: "N" },
      { x: 5, y: 13, dir: "N" },
      { x: 7, y: 13, dir: "N" },
      { x: 3, y: 11, dir: "N" },
      { x: 5, y: 11, dir: "N" },
      { x: 7, y: 11, dir: "N" },
      { x: 1, y: 13, dir: "N" }
    ];
    const canvas = document.getElementById("drillCanvas");
    const ctx = canvas.getContext("2d");
    let p = 10

    function drawFormation() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      formation.forEach(cadet => {
        ctx.beginPath();
        ctx.arc(cadet.x * 40, cadet.y * 40, 10, 0, Math.PI * 2);
        ctx.fill();
      });
    }
    drawFormation()
    function forwardMarch(dir, cadet) {
        if (dir =="N"){
              cadet.y -= 1; // move up
        }else if(dir =="E"){
              cadet.x += 1; // move up
        }else if(dir =="S"){
              cadet.y += 1; // move up
        }else if(dir =="W"){
              cadet.x -= 1; // move up
        }else if(dir =="NE"){
              cadet.x += 1; // move up
              cadet.y -= 1;
        }else if(dir =="NW"){
              cadet.x -= 1; // move up
              cadet.y -= 1;
        }else if(dir =="SE"){
              cadet.x += 1; // move up
              cadet.y += 1;
        }else if(dir =="SW"){
              cadet.x -= 1; // move up
              cadet.y += 1;
        }
        drawFormation()
    }

    function forwardHalfStep(dir, cadet, mult = 1) {
        if (dir =="N"){
              cadet.y -= 0.5*mult; // move up
        }else if(dir =="E"){
              cadet.x += 0.5*mult; // move up
        }else if(dir =="S"){
              cadet.y += 0.5*mult; // move up
        }else if(dir =="W"){
              cadet.x -= 0.5*mult; // move up
        }else if(dir =="NE"){
              cadet.x += 0.5*mult; // move up
              cadet.y -= 0.5*mult;
        }else if(dir =="NW"){
              cadet.x -= 0.5*mult; // move up
              cadet.y -= 0.5*mult;
        }else if(dir =="SE"){
              cadet.x += 0.5*mult; // move up
              cadet.y += 0.5*mult;
        }else if(dir =="SW"){
              cadet.x -= 0.5*mult; // move up
              cadet.y += 0.5*mult;
        }
        drawFormation()
    }

    function turnHalfRight(cadet){
        if (cadet.dir == "N"){
            cadet.dir = "NE"
        }else if (cadet.dir == "E"){
            cadet.dir = "SE"
        }else if (cadet.dir == "S"){
            cadet.dir = "SW"
        }else if (cadet.dir == "W"){
            cadet.dir = "NW"
        }else if (cadet.dir == "NE"){
            cadet.dir = "E"
        }else if (cadet.dir == "NW"){
            cadet.dir = "N"
        }else if (cadet.dir == "SE"){
            cadet.dir = "S"
        }else if (cadet.dir == "SW"){
            cadet.dir = "W"
        }else {
            console.log("You're an idiot. turnHalfRight only takes one argument")
        }
    }
    function turnRight(cadet){
        turnHalfRight(cadet)
        turnHalfRight(cadet)
    }
    function turnLeft(cadet){
        turnRight(cadet)
        turnRight(cadet)
        turnRight(cadet)
    }
    function aboutFace(cadet){
        turnHalfRight(cadet)
        turnHalfRight(cadet)
    }
    const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
